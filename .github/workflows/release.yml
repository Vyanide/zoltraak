name: Release

# Manual-only: shows a "Run workflow" button under the repo's Actions tab.
on:
    workflow_dispatch:
        inputs:
            version:
                description: "Version / tag for the release (e.g. v1.0.0)"
                required: true
                type: string
            prerelease:
                description: "Mark as a pre-release"
                required: false
                type: boolean
                default: false

# Needed to create the tag and the release.
permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Create release
              env:
                  GH_TOKEN: ${{ github.token }}
                  VERSION: ${{ inputs.version }}
                  PRERELEASE: ${{ inputs.prerelease }}
              run: |
                  flags=(--target "${GITHUB_SHA}" --title "${VERSION}" --generate-notes)
                  if [ "${PRERELEASE}" = "true" ]; then flags+=(--prerelease); fi
                  # Creates the "${VERSION}" tag at this commit if it doesn't exist and
                  # publishes the release. GitHub auto-attaches source code archives.
                  gh release create "${VERSION}" "${flags[@]}"
