services:
    server:
        build:
            context: ./server
        image: zoltraak-server
        ports:
            - "${SERVER_PORT:-3000}:3000"
        environment:
            PORT: 3000
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 5s

    web:
        build:
            context: ./web
            args:
                # The origin the browser calls; must be reachable from the user's browser
                # (the published SERVER_PORT below), not the `server` compose hostname.
                VITE_SERVER_URL: ${VITE_SERVER_URL:-http://localhost:3000}
        image: zoltraak-web
        ports:
            - "${WEB_PORT:-5173}:3000"
        environment:
            HOST: 0.0.0.0
            PORT: 3000
        depends_on:
            server:
                condition: service_healthy
        restart: unless-stopped
