name: CI

# Build + type-check both projects on every push to main and every pull request.
# Mirrors the repo's manual verification (`bun run check` / `bun run build`);
# there is no test suite, so these are the gate.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: web (check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run build

  server:
    name: server (check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - run: bun install --frozen-lockfile
      - run: bun run check
